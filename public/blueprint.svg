<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" width="1200" height="850">
  <rect width="1200" height="850" fill="#fdfdfc"/>

  <!-- faint grid -->
  <g stroke="#eeeeea" stroke-width="1">
    <path d="M0 50H1200M0 150H1200M0 250H1200M0 350H1200M0 450H1200M0 550H1200M0 650H1200M0 750H1200"/>
    <path d="M50 0V850M150 0V850M250 0V850M350 0V850M450 0V850M550 0V850M650 0V850M750 0V850M850 0V850M950 0V850M1050 0V850M1150 0V850"/>
  </g>

  <!-- sheet border -->
  <rect x="18" y="18" width="1164" height="814" fill="none" stroke="#888" stroke-width="2"/>
  <rect x="24" y="24" width="1152" height="802" fill="none" stroke="#bbb" stroke-width="1"/>

  <!-- outer walls -->
  <rect x="100" y="80" width="1000" height="680" fill="none" stroke="#4a4a4a" stroke-width="4"/>

  <!-- interior walls -->
  <g stroke="#5a5a5a" stroke-width="2.5" fill="none">
    <path d="M520 82V240"/>
    <path d="M520 300V360H700"/>
    <path d="M840 360H1098"/>
    <path d="M102 500H320"/>
    <path d="M380 500H660"/>
    <path d="M660 500V758"/>
    <path d="M660 500 H900"/>
    <path d="M900 360V440"/>
    <path d="M900 520V758"/>
    <path d="M300 500V620"/>
    <path d="M300 680V758"/>
  </g>

  <!-- door swings -->
  <g stroke="#9a9a9a" stroke-width="1.2" fill="none">
    <path d="M520 240 A60 60 0 0 1 460 300"/>
    <path d="M320 500 A60 60 0 0 0 380 440"/>
    <path d="M900 440 A80 80 0 0 0 820 520"/>
    <path d="M300 620 A60 60 0 0 1 240 680"/>
  </g>

  <!-- fixtures -->
  <g stroke="#8a8a8a" stroke-width="1.5" fill="none">
    <!-- kitchen counter + sink -->
    <path d="M104 84 H360 V150 H104"/>
    <rect x="200" y="98" width="70" height="40" rx="6"/>
    <circle cx="220" cy="118" r="4"/>
    <circle cx="250" cy="118" r="4"/>
    <!-- range -->
    <rect x="290" y="94" width="56" height="52"/>
    <circle cx="304" cy="108" r="6"/><circle cx="332" cy="108" r="6"/>
    <circle cx="304" cy="132" r="6"/><circle cx="332" cy="132" r="6"/>
    <!-- bath 1 -->
    <rect x="540" y="96" width="120" height="56" rx="14"/>
    <ellipse cx="720" cy="120" rx="20" ry="26"/>
    <rect x="700" y="88" width="40" height="14"/>
    <rect x="780" y="92" width="52" height="34" rx="6"/>
    <!-- bath 2 -->
    <ellipse cx="960" cy="420" rx="18" ry="24"/>
    <rect x="942" y="390" width="36" height="12"/>
    <rect x="1010" y="386" width="50" height="32" rx="6"/>
    <!-- laundry -->
    <rect x="120" y="530" width="54" height="54"/>
    <circle cx="147" cy="557" r="18"/>
    <rect x="186" y="530" width="54" height="54"/>
    <circle cx="213" cy="557" r="18"/>
    <!-- water heater -->
    <circle cx="740" cy="580" r="34"/>
    <text x="740" y="585" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#8a8a8a" text-anchor="middle" stroke="none">WH</text>
    <!-- island -->
    <rect x="180" y="260" width="180" height="80" rx="4"/>
  </g>

  <!-- room labels -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#a0a0a0" letter-spacing="3" text-anchor="middle">
    <text x="300" y="215">KITCHEN</text>
    <text x="760" y="230">BATH 1</text>
    <text x="990" y="470">BATH 2</text>
    <text x="200" y="640">LAUNDRY</text>
    <text x="480" y="640">MECH</text>
    <text x="990" y="640">GARAGE</text>
    <text x="600" y="440" font-size="15">HALL</text>
  </g>

  <!-- dimension line -->
  <g stroke="#b8b8b8" stroke-width="1" fill="none">
    <path d="M100 56 H1100"/>
    <path d="M100 48 V64 M520 48 V64 M1100 48 V64"/>
    <path d="M76 80 V760"/>
    <path d="M68 80 H84 M68 500 H84 M68 760 H84"/>
  </g>
  <g font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a8a8a8" text-anchor="middle">
    <text x="310" y="44">42'-0"</text>
    <text x="810" y="44">58'-0"</text>
  </g>

  <!-- north arrow -->
  <g stroke="#9a9a9a" stroke-width="1.5" fill="none">
    <circle cx="1128" cy="120" r="22"/>
    <path d="M1128 136 V106 M1128 106 L1121 118 M1128 106 L1135 118"/>
  </g>

  <!-- title block -->
  <g>
    <rect x="880" y="778" width="302" height="48" fill="#fff" stroke="#888" stroke-width="1.5"/>
    <path d="M1040 778 V826" stroke="#bbb" stroke-width="1"/>
    <text x="896" y="798" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#666" letter-spacing="1">P-101</text>
    <text x="896" y="816" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#999">PLUMBING PLAN</text>
    <text x="1056" y="798" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#999">SCALE: 1/8" = 1'-0"</text>
    <text x="1056" y="816" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#999">SHEET 3 OF 12</text>
  </g>
</svg>
